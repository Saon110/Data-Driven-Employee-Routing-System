services:
  - type: web
    name: dders-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ROUTING_ENGINE
        value: lightweight

  - type: web
    name: dders-frontend
    env: docker
    dockerContext: ./Frontend
    dockerfilePath: ./Frontend/Dockerfile
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://dders-backend.onrender.com
